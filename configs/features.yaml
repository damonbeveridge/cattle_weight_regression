# Image preprocessing
image_size: [640, 640]
normalise: true
mean: [0.485, 0.456, 0.406]  # ImageNet defaults — update after computing dataset stats
std: [0.229, 0.224, 0.225]

# Augmentation (applied during training only)
augmentation:
  enabled: true
  horizontal_flip: 0.5
  vertical_flip: 0.0
  rotation_degrees: 15
  brightness_jitter: 0.2
  contrast_jitter: 0.2
