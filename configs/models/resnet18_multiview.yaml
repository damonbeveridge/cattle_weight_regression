# ResNet18 multi-view late-fusion model — all 4 views processed together per cow
type: cnn
architecture: multi-view
n_views: 4
backbone: resnet18
pretrained: true

# Training
epochs: 15
batch_size: 16
lr: 1.0e-4
# num_workers: 0 is safest on Windows; increase to 4+ on Linux/macOS
num_workers: 4

# Reproducibility
seed: 42

# Output directory name under outputs/models/
name: resnet18_multiview
