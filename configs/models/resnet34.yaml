# ResNet34 single-image regression baseline
type: cnn
architecture: single-view
backbone: resnet34
pretrained: true

# Training
epochs: 50
batch_size: 16
lr: 1.0e-4
# num_workers: 0 is safest on Windows; increase to 4+ on Linux/macOS
num_workers: 4

# Reproducibility
seed: 42

# Output directory name under outputs/models/
name: resnet34