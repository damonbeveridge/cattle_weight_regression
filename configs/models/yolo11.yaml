# YOLOv11 regression configuration
model: yolo11n.pt   # nano; swap for yolo11s / yolo11m / yolo11l / yolo11x
task: obb           # oriented bounding-box; adjust to detect for standard bbox
mode: train

# Training hyperparameters
epochs: 100
batch: 16
imgsz: 640
lr0: 0.01
lrf: 0.01           # final lr = lr0 * lrf
weight_decay: 0.0005
patience: 20        # early stopping

# Output
project: outputs/models
name: yolo11_run
